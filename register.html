<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | BloodConnect</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth-body">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"
          ><i class="fas fa-droplet me-2"></i>BloodConnect</a
        >
        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-ghost btn-sm" href="login.html">Login</a>
          <a class="btn btn-danger btn-sm" href="index.html">Home</a>
        </div>
      </div>
    </nav>

    <section class="register-section auth-wrap">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-lg-8" data-aos="zoom-in" data-aos-duration="700">
            <div class="auth-card p-4 p-md-5">
              <div class="text-center mb-4">
                <span class="hero-badge mb-3"
                  ><i class="fas fa-user-plus"></i> BloodConnect
                  Onboarding</span
                >
                <h1 class="h3 fw-bold mb-2">Create your secure account</h1>
                <p class="auth-meta mb-0">
                  Join as a donor or receiver and access real-time blood request
                  workflows.
                </p>
              </div>

              <div
                id="alertMessage"
                class="alert alert-dismissible fade d-none"
                role="alert"
              >
                <span id="alertText"></span>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="alert"
                  aria-label="Close alert"
                  title="Close alert"
                ></button>
              </div>

              <div class="mb-4">
                <label class="form-label fw-bold">Register as</label>
                <div class="btn-group w-100" role="group">
                  <input
                    type="radio"
                    class="btn-check"
                    name="role"
                    id="roleDonor"
                    value="donor"
                    checked
                  />
                  <label class="btn btn-outline-danger" for="roleDonor"
                    >Donor</label
                  >
                  <input
                    type="radio"
                    class="btn-check"
                    name="role"
                    id="roleReceiver"
                    value="receiver"
                  />
                  <label class="btn btn-outline-danger" for="roleReceiver"
                    >Receiver</label
                  >
                </div>
              </div>

              <form id="registerForm" class="row g-3">
                <div class="col-md-6">
                  <label class="form-label" for="name">Full Name</label>
                  <input class="form-control" type="text" id="name" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="email">Email</label>
                  <input
                    class="form-control"
                    type="email"
                    id="email"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="phone">Phone</label>
                  <input class="form-control" type="tel" id="phone" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="password">Password</label>
                  <div class="input-group">
                    <input
                      class="form-control"
                      type="password"
                      id="password"
                      required
                    />
                    <button
                      class="btn btn-outline-secondary"
                      type="button"
                      id="toggleRegisterPassword"
                    >
                      <i class="fas fa-eye"></i>
                    </button>
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label" for="city">City</label>
                  <input class="form-control" type="text" id="city" required />
                </div>

                <div class="col-md-6" id="bloodGroupSection">
                  <label class="form-label" for="bloodGroup">Blood Group</label>
                  <select class="form-select" id="bloodGroup">
                    <option value="">Select blood group</option>
                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>AB+</option>
                    <option>AB-</option>
                    <option>O+</option>
                    <option>O-</option>
                  </select>
                </div>

                <div class="col-12 d-none" id="availabilitySection">
                  <div class="form-check form-switch mt-2">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="availabilityStatus"
                      checked
                    />
                    <label
                      class="form-check-label text-white"
                      for="availabilityStatus"
                      >Available to donate right now</label
                    >
                  </div>
                </div>

                <div class="col-12">
                  <button type="submit" class="btn btn-danger btn-lg w-100">
                    <i class="fas fa-user-plus me-2"></i>Create Account
                  </button>
                </div>
              </form>

              <p class="text-center auth-meta mt-4 mb-0">
                Already have an account?
                <a class="text-white fw-bold" href="login.html">Login now</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({ duration: 650, once: true, offset: 40 });
    </script>
    <script src="js/app.js"></script>
    <script src="js/auth-register.js"></script>
  </body>
</html>
