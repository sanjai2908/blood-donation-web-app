<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | BloodConnect</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="auth-body">
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"
          ><i class="fas fa-droplet me-2"></i>BloodConnect</a
        >
        <div class="ms-auto d-flex gap-2">
          <a class="btn btn-ghost btn-sm" href="register.html">Register</a>
          <a class="btn btn-danger btn-sm" href="index.html">Home</a>
        </div>
      </div>
    </nav>

    <section class="login-section auth-wrap">
      <div class="container">
        <div class="row justify-content-center">
          <div
            class="col-lg-5 col-md-8"
            data-aos="zoom-in"
            data-aos-duration="700"
          >
            <div class="auth-card p-4 p-md-5">
              <div class="text-center mb-4">
                <span class="hero-badge mb-3"
                  ><i class="fas fa-shield-heart"></i> Secure Access
                  Portal</span
                >
                <h1 class="h3 fw-bold mb-2">Welcome back to BloodConnect</h1>
                <p class="auth-meta mb-0">
                  Sign in with enterprise-grade security and role-based access.
                </p>
              </div>

              <div
                id="alertMessage"
                class="alert alert-dismissible fade d-none"
                role="alert"
              >
                <span id="alertText"></span>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="alert"
                  aria-label="Close alert"
                  title="Close alert"
                ></button>
              </div>

              <form id="loginForm" class="d-grid gap-3">
                <div>
                  <label class="form-label" for="email">Email Address</label>
                  <input
                    class="form-control"
                    type="email"
                    id="email"
                    placeholder="you@example.com"
                    required
                  />
                </div>
                <div>
                  <label class="form-label" for="password">Password</label>
                  <div class="input-group">
                    <input
                      class="form-control"
                      type="password"
                      id="password"
                      placeholder="Enter your password"
                      required
                    />
                    <button
                      class="btn btn-outline-secondary"
                      type="button"
                      id="togglePassword"
                    >
                      <i class="fas fa-eye"></i>
                    </button>
                  </div>
                </div>
                <div
                  class="d-flex justify-content-between align-items-center flex-wrap gap-2"
                >
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="rememberMe"
                    />
                    <label class="form-check-label text-white" for="rememberMe"
                      >Remember me</label
                    >
                  </div>
                  <a class="text-white" href="forgot-password.html"
                    >Forgot Password?</a
                  >
                </div>
                <button type="submit" class="btn btn-danger btn-lg">
                  <i class="fas fa-sign-in-alt me-2"></i>Secure Login
                </button>
              </form>

              <form id="twoFactorForm" class="d-grid gap-3 d-none mt-4">
                <div class="auth-meta">
                  Two-factor verification required. Enter OTP or a recovery
                  code.
                </div>
                <div>
                  <label class="form-label" for="otpCode"
                    >Authenticator Code</label
                  >
                  <input
                    class="form-control"
                    type="text"
                    id="otpCode"
                    maxlength="6"
                    placeholder="123456"
                  />
                </div>
                <button type="submit" class="btn btn-danger btn-lg">
                  <i class="fas fa-shield-halved me-2"></i>Verify Code
                </button>

                <hr class="my-2 border-light border-opacity-25" />
                <div>
                  <label class="form-label" for="recoveryCode"
                    >Recovery Code</label
                  >
                  <input
                    class="form-control"
                    type="text"
                    id="recoveryCode"
                    placeholder="AB12-CD34"
                  />
                </div>
                <button
                  type="button"
                  id="recoveryLoginButton"
                  class="btn btn-outline-danger"
                >
                  <i class="fas fa-key me-2"></i>Use Recovery Code
                </button>

                <button
                  type="button"
                  id="backToLoginButton"
                  class="btn btn-link text-white"
                >
                  Back to login
                </button>
              </form>

              <p class="text-center auth-meta mt-4 mb-0">
                No account yet?
                <a class="text-white fw-bold" href="register.html"
                  >Create one</a
                >
              </p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init({ duration: 650, once: true, offset: 40 });
    </script>
    <script src="js/app.js"></script>
    <script src="js/auth-login.js"></script>
  </body>
</html>
