<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" fill="none">
  <defs>
    <linearGradient id="patientBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff5f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe0e6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="patientSkin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdbcb4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8a89c;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1000" height="700" rx="40" fill="url(#patientBg)" />

  <!-- Hospital room background -->
  <rect x="80" y="60" width="840" height="560" rx="32" fill="#ffffff" opacity="0.94" stroke="#fce4ec" stroke-width="2" />

  <!-- Hospital bed -->
  <g id="hospitalBed">
    <!-- Mattress -->
    <rect x="150" y="380" width="320" height="120" rx="12" fill="#f3f4f6" stroke="#d1d5db" stroke-width="2" />
    <!-- Bed frame -->
    <rect x="140" y="500" width="340" height="20" fill="#64748b" rx="4" />
    <!-- Legs -->
    <rect x="155" y="520" width="16" height="60" fill="#475569" rx="3" />
    <rect x="435" y="520" width="16" height="60" fill="#475569" rx="3" />
    <!-- Pillow -->
    <rect x="160" y="350" width="100" height="40" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" />
  </g>

  <!-- Patient in hospital bed -->
  <g id="patient">
    <!-- Head -->
    <circle cx="240" cy="300" r="35" fill="url(#patientSkin)" stroke="#f8a89c" stroke-width="2" />
    <!-- Hair -->
    <path d="M 215 280 Q 240 260 265 280 L 260 310 Q 240 320 220 310 Z" fill="#92400e" />
    <!-- Face -->
    <circle cx="235" cy="305" r="2" fill="#1f1f1f" />
    <circle cx="245" cy="305" r="2" fill="#1f1f1f" />
    <line x1="238" y1="315" x2="242" y2="315" stroke="#d97706" stroke-width="1.5" />

    <!-- Torso under blanket -->
    <ellipse cx="280" cy="420" rx="55" ry="65" fill="#e8d5f2" opacity="0.6" />
    <!-- Blanket folds -->
    <path d="M 220 420 Q 240 440 260 430 Q 280 420 300 440" fill="none" stroke="#d8b4fe" stroke-width="2" opacity="0.5" />
  </g>

  <!-- IV drip above bed -->
  <g id="ivDrip">
    <!-- Pole -->
    <rect x="445" y="250" width="14" height="200" fill="#64748b" rx="3" />
    <!-- IV hook -->
    <circle cx="452" cy="245" r="18" fill="#475569" />
    <!-- IV bag -->
    <path d="M 440 210 L 465 210 L 470 280 L 435 280 Z" fill="#fca5a5" stroke="#f87171" stroke-width="2" rx="6" />
    <!-- Bag label -->
    <text x="448" y="245" font-family="Arial" font-size="10" fill="#991b1b" font-weight="bold">Blood</text>
    <!-- Tubing -->
    <path d="M 450 280 Q 420 320 340 360" stroke="#64748b" stroke-width="2.5" fill="none" stroke-linecap="round" />
    <!-- Connection point -->
    <circle cx="340" cy="360" r="4" fill="#dc2626" />
  </g>

  <!-- Doctor/Healthcare provider attending -->
  <g id="doctor">
    <!-- Head -->
    <circle cx="620" cy="220" r="32" fill="url(#patientSkin)" stroke="#f8a89c" stroke-width="2" />
    <!-- Hair -->
    <path d="M 600 200 L 640 200 L 638 225 L 602 225 Z" fill="#451a03" />
    <!-- Stethoscope around neck -->
    <path d="M 620 250 Q 600 270 600 290" stroke="#64748b" stroke-width="2" fill="none" />
    <path d="M 620 250 Q 640 270 640 290" stroke="#64748b" stroke-width="2" fill="none" />

    <!-- White coat -->
    <path d="M 600 250 L 640 250 L 650 380 L 590 380 Z" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" />
    <!-- Coat pocket -->
    <rect x="615" y="280" width="20" height="40" fill="#e0f2fe" opacity="0.5" rx="2" />

    <!-- Right arm -->
    <ellipse cx="680" cy="320" rx="12" ry="55" fill="url(#patientSkin)" transform="rotate(30 680 320)" />
    <!-- Hand holding pulse oximeter -->
    <circle cx="710" cy="280" r="14" fill="url(#patientSkin)" stroke="#f8a89c" stroke-width="1.5" />
    <!-- Pulse oximeter device -->
    <rect x="720" y="270" width="28" height="20" rx="3" fill="#ec4444" stroke="#b91c1c" stroke-width="1.5" />
    <text x="724" y="283" font-family="Arial" font-size="8" fill="#fff" font-weight="bold">O2</text>

    <!-- Left arm -->
    <ellipse cx="560" cy="310" rx="12" ry="45" fill="url(#patientSkin)" transform="rotate(-25 560 310)" />
  </g>

  <!-- Vital signs monitor -->
  <g id="vitalMonitor">
    <rect x="750" y="180" width="120" height="100" rx="8" fill="#1e293b" stroke="#0f172a" stroke-width="2" />
    <!-- Screen content -->
    <text x="765" y="205" font-family="Arial" font-size="9" fill="#10b981" font-weight="bold">VITALS</text>
    <line x1="765" y1="215" x2="860" y2="215" stroke="#10b981" stroke-width="1" />
    <text x="765" y="235" font-family="monospace" font-size="8" fill="#10b981">HR: 78</text>
    <text x="765" y="250" font-family="monospace" font-size="8" fill="#10b981">O2: 98%</text>
    <text x="765" y="265" font-family="monospace" font-size="8" fill="#10b981">Temp: 37C</text>
  </g>

  <!-- Recovery indicator -->
  <g id="recoveryBadge">
    <circle cx="850" cy="480" r="45" fill="#dcfce7" stroke="#86efac" stroke-width="2.5" />
    <text x="840" y="485" font-family="Arial" font-size="11" fill="#16a34a" font-weight="bold">STABLE</text>
  </g>

  <!-- Medical care info -->
  <g id="careInfo">
    <rect x="120" y="620" width="760" height="60" rx="12" fill="#f5f3ff" opacity="0.5" />
    <text x="160" y="650" font-family="Arial" font-size="12" fill="#6b5b95" font-weight="bold">✓ Continuous monitoring</text>
    <text x="160" y="668" font-family="Arial" font-size="12" fill="#6b5b95">✓ Professional care team</text>
    <text x="480" y="650" font-family="Arial" font-size="12" fill="#6b5b95" font-weight="bold">✓ Safe transfusion protocols</text>
    <text x="480" y="668" font-family="Arial" font-size="12" fill="#6b5b95">✓ 24/7 patient support</text>
  </g>

  <!-- Decorative circles -->
  <circle cx="150" cy="120" r="60" fill="#fca5a5" opacity="0.1" />
  <circle cx="920" cy="550" r="80" fill="#fecaca" opacity="0.08" />
</svg>